body:
  text: 法帖刋誤跋長睿頃官于洛因得從之游嘗閲吾家所蔵内府帖且以米老跋尾辨之惜其疎略遂著此書議論精確悉有証據使真贋了然誠前人所未到也是書之作實自余發之嘗作詩題吾家大令帖見於第九章云政和甲午正月十三日周南王珍晉玉題於開封尹㕔之東齋余待罪天禄與觀中祕古蹟石刻所本其真易識盖了然知其偽者十九而後乃知黄子之作此書拔賞者寡而掊擊者多故有以也書之考引載籍則昭昭矣至其洞察真贋品藻髙下水墨之間毫釐千里則非書家者流心知其意未易不惑余是以道余所見於天禄者使世知其論刻之嚴如此皆不妄也政和五年三月中澣襄陵許翰崧老跋
