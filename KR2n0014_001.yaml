  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0014_WYG_001-1a, image: WYG0681/WYG0681-0378c.png}
body:
  text: 法帖刊誤卷上宋黃伯思撰淳化中內府既博訪古遺蹟時翰林侍書王著受詔緒正諸帖著雖號工草𨽻然初不深書學又昧古今故祕閣法帖十㢧中璠珉雜糅論次乖訛世多耳觀遂久莫辨故禮部郎米芾元章筆翰妙薦紳間在淮南幕府日嘗跋㢧尾作數百語頗有條流但概舉其目踈略甚多故諸部中或僞迹甚著而不覺者若李懷琳所作衛夫人書逸少闊别稍久帖之類有雖審其僞而譏評未當者若知伯英大令諸草帖為唐人書而不知乃書晉人帖語之類有譏評雖當主名昭然而不能辨者若以田疇字為非李斯書而不知乃李陽冰明州碑中字之類有誤著其主名者若以晉人章草諸葛亮傳中語遂以為亮書之類是也其餘舛午尚多書家責能書者備故僕于元章慨然古語有之善書不鍳善鍳不書僕自幼觀古帖至多雖毫墨積習未至而心悟神解時有所得故作法帖刋誤凡論真僞皆有據依使鍾王復生不易此評矣元章今已物故恨不示之後有髙識賞豫知言大觀戊子嵗六月七日西都府院東齊序第一帝王書凡草書分波磔者名章草非此者但謂之草猶古𨽻之生今正書故章草當在草書先然本無章名因漢建初中杜操伯度善此書章帝稱之故後世目焉今此卷首帖偶章草便以為章帝書誤矣然此書亦前代作但録書者集成千字中語耳米徑以此辨之未中其病米云晉武書當是孝武非也僕案省啓帖與後譙王帖雖在疑録似非一家書續帖中炎報帖頗與此茟法同炎晉武名非孝武也然皆後人依倣此帖末云故遣信還古者謂使為信故逸少帖云信遂不取答真誥云公至山下又遣一信見告謝宣城傳云荆州信去倚待陶隱居帖云明旦信還仍過取反凡言信者皆謂使人也近世猶有此語故虞永興帖云事已信人口具而今之流俗遂以遣書饋物為信故謂之書信而謂前人之語亦然不復知魏晉以還所謂信者乃使之别名耳阿史病轉差帖云晉宣帝亦未然安軍破缸數朝三草書筆勢糾繞若一其僞不疑僕幼時當觀世傳七賢書末有白字皆連名作㸃七人所作了無小異雖當時筆法傳授或同然人書不同亦如面焉不應乃爾無别固疑其僞是時宿輩長者或謂不然後觀竇臮書賦始知七賢帖果李懷琳僞作此三帝草書亦是類也米云梁高當是齊高非也此帖末云蕭衍正梁武名梁武廟號高祖此書目誤以祖為帝耳宋明帝帖云報休祐休範二家內人知祐晉平王也範桂陽王也宋史以休祐為休祜蓋冊牘傳寫之訛當以祐為是弔江叔帖非唐文皇書案髙宗永隆元年七月丙申江王元祥薨即此帖所謂江叔也髙宗多以國呼諸父如滕叔不須賜謂滕王元嬰猶以元祥為江叔此正髙宗書也叔藝韞多材帖亦髙宗書中云聊以示藹謂魯王靈夔之子范陽王藹也靈夔亦髙宗叔史稱其篤學善草𨽻此帖所謂叔藝韞多材慈深善誨藹夙奉趨庭之訓早擅臨池之工者以此後有答進枇杷并移營五橋南二帖皆高宗書此數段並誤入太宗帖中陳文帝謂宣帝我名子以伯汝冝以叔此卷陳永陽王伯智書誤録在長沙王叔懷後又据陳史長沙王但有叔堅而無叔懷其晜亦無此名觀帖尾作名處疑是叔愼叔愼陳嶽陽王也蓋摹傳之變第二漢魏吳晉人書唐文皇右軍傳贊云伯英臨池之妙無復餘蹤當是時逺購冥搜古帖畢出而御府所蓄其冨無倫尚無伯英書後世豈可復得非特唐也晉世見者益寡故庾翼與右軍書云昔得伯英章草十紙過江亡失常歎妙跡永絶此卷章草芝白一帖差近古亦疑先賢摹放也前知汝殊愁以下五帖米云皆張長史書信然但帖中有云數往虎丘祖希時面祖希張𤣥之字也𤣥之與大令同時虎丘地在江左當是長史書二王帖辭耳崔子玉書云數附書知聞以解其憂唐人書也字亦非漢尚書宣示鍾書真跡本在王丞相導家導過江時藏衣帶中以遺逸少逸少以遺王修修死其毋以修平日所寶并入棺真蹟遂絶此本右軍所臨者白騎遂帖乃王大令臨唐開元中在滑臺人家并逸少臨宣示帖藏之故誤録在鍾部長風帖乃逸少早年書殊未變鍾體故亦誤置此長風范母子等語二王帖間多有米云齊梁人書非也皇象文武帖蓋寫漢東觀校書郎中髙彪送幽州督軍御史第五永針耳結字亦古史本云呂尚七十此云師尚七十史本云明其果毅此云昭其果毅蓋作史者避晉諱當以此為是五將三門下當所地有九變丘陵山川人有計䇿六竒五間揔兹三事謀則咨詢無曰已能務在求賢淮隂之勇廣野是尊勿謂時險不正其身勿謂無人莫識已真忘富遺貴福祿乃存枉道依合後無所觀先公髙莭永越可尊佩藏斯戒以厲終身時蔡雍輩並賦詩送永獨彪作此針雍等甚美之以為莫尚也全章見東漢書此段軼之象書人間殊少惟建業有吳時天發神讖碑若篆若隸字勢雄偉相傳乃象書也張懷瓘目以沈著痛快真得其茟勢云皇象後章草一表蓋唐人僞作其體正與世傳曹植書鷂雀賦同皆非真迹至若孫皓上晉武表亦章草書字畫髙古與此有間矣王小令此年帖本唐人所畜與二鍾虞松三帖為一卷珉帖末云輔國司馬君茟勢婉雅與此間矣此亦無後五字謝安後一帖傳摹逺真米以為僞者蓋以惶恐再拜當時罕用然施于尊老或有之陶華陽真誥中有帖云許𤣥惶恐再拜正晉世體也王世將二十四帖與第一卷數朝等僞帖字勢無異惟後兩表極古信能傳鍾氏筆意而右軍學之也表中有云頓乏勿勿按顔氏家訓云世中書翰多稱勿勿相承如此莫原其由或有妄言此忽忽之殘缺耳說文勿者州里所建之旗蓋以趨民事故匆遽者稱勿勿僕謂顔氏以說文證此字為長而今世流俗又妄于勿字中斜益一㸃讀為匆字彌失真矣按祭義云勿勿諸其欲其饗之也注勿勿猶勉勉也慤愛之貌杜牧之詩浮生長勿勿是知勿勿出于祭義唐人詩中用之不特稱于書翰耳第三晉宋齊人書庾亮書云奉告書箱先為媞子作案江淮之間謂毋曰媞此云媞子未知目何戚也尓雅云媞姆安也庾翼帖稱故吏從事中郎按翼嘗為陶侃太尉府從事中郎此當是與侃啓也杜預十一月二十四日帖云道逺書問又簡問得來况非當時尺牘中語或是江左人書不特親故帖僞也親故末云數附書信以慰吾心亦近世流俗語耳晉劉超為人愼密自以書類元帝不敢與外書此帖不應尚𫝊又字勢與元帝大别其僞甚矣謝莊首終仕宋而題曰晉大誤王著敘王坦之書列于逸少諸子間意以名皆從之殊不知坦之乃述子自太原王耳非琅邪族也自非通古甚那至爾川本云意非字下有不字劉瓌之乃東晉時善八分者大令既不肯書太極殿榜謝安石遂令瓌之以八分題之今此草帖非真與王廙二十四日帖無異王氏凝操徽渙之四子書皆真帖逸少七子上四人與子敬書具傳惟𤣥之肅之遺跡未見餘皆得家範而體各不同是善學逸少書者猶顔延年對宋文帝論其諸子自謂竣得臣筆測得臣文㚟得臣義躍得臣酒書亦猶是也僕今以擬王氏諸子則逸少之書凝之得其韻操之得其體徽之得其勢渙之得其貌獻之得其源然而大令之書特知名而與逸少方駕者蓋能本父之書意所循者大故也真行則法鍾草聖則師張二家之法逸少所自出從而效之所以特髙於諸王猶魯堂諸子由賜商偃皆以儒稱卒之得其傳者子淵而已索靖七月二十六日帖本七紙晉王平南廙每寶玩之值永嘉亂乃四叠綴衣中以度江唐蒲州桑泉令豆盧器得之叠跡猶存今所録惟一紙耳摹傳失真無復意象紀瞻帖中有云貧家無以將意所謂物微意全也觀此語不待見筆跡可判其僞矣山濤啓事與李懷琳所撰七賢書中濤書自相戈盾但此啓事文是而書非七賢帖中筆語皆妄也此卷僞帖甚衆如庾翼後一帖與沈嘉王循司馬攸劉穆之王劭王廞張翼陸雲羊欣卞壼謝登與前杜預一帖及劉超劉瓌之紀瞻山濤等帖皆一體僞書孔琳之帖有恨恨腳中轉劇近明散未覺益十二字偏小蓋行側注字摹帖者妄以入行耳當依本為勝王僧䖍兩啓皆佳結字與擬王琰乞江郢所統郡啓同書聲信不虛傳第四梁陳唐人書齊豫章王嶷孫確子範之子在梁位司徒右長史此云征南將軍不知何據恐是梁邵陵王綸之子確也其書孝經一章亦近世僞體非江左書阮研帖亦然蕭子雲有章草史孝山出師頌一章甚古雅與此卷正書列子逺矣紙中王濛筆下徐偃信篤論也陳逵者晉西中郎將也此云陳朝陳逵書誤矣禇河南潭府帖末云舅遂良報薛八侍中前外舅張知常以為河南謫潭時無有薛姓為侍中者僕嘗考之信然案遂良以髙宗永徽六年貶潭州都督前此上至神堯時為侍中者裴矩齊王元吉杜如晦王圭魏元成楊師道劉洎張行成髙季輔宇文節韓瑗凡十一人未有薛姓者至儀鳳中薛元超始作相既在遂良後又不作侍中書時在外鎮未有兼此官者及觀字勢亦斆禇作嫵媚態其僞必矣後家姪至一帖乃真河南得意書翩翩有逸敬體以前帖視之猶蓬葭倚瑶林也山河帖乃禇河南所書枯樹賦中抄出耳此庾子山作而禇書之後禇遂良述四字後人妄益虞永興大運帖歐陽率更比年帖皆集二公碑中字為之桞少師與弟帖末云誠懸呈人多疑之以顔籀注漢書丞相衡傳云字以表德豈人所自稱桞不當稱字然嘗觀逸少敬謝帖自云王逸少白廬山逺公集盧循與逺書自云范陽盧子先叩頭則古人稱字蓋或有之陸柬之帖云近得告為慰上下無恙不得吳興近問懸心得藥書散勢耿耿嘗也殊不類唐人語當是臨晉宋人帖不爾效其語作此耳薄紹之宋世為丹楊尹書與羊欣齊名時號羊薄此卷目為唐人謬甚矣第五雜帖自蒼頡至程邈書皆僞史籀書傳世者岐鼓耳今此書云揚州裴易德系字殊無三代體與其辭皆唐人筆也李斯書米云不知何人書僕按其文云田疇耕耨為政期月而致法令使父子為鄒魯乃李陽冰篆王密所撰明州刺史河東裴公紀德碣中字也其碑略云驚通復田疇闢教以耕耨故為政可期月而致寬之則法令非行公之化夷俗為鄒魯使父子長幼各得其宜此帖乃摹田疇等十八字為斯書與碑中篆無銖黍差而米云不知何人書蓋未嘗見此碑耳程邈在秦雲陽獄作𨽻字乃今漢碑中字是也有此𨽻方生今正書不應邈已作之宋儋唐明皇帝時人學鍾書但作側戾殊失天勢王著録此書不知乃唐士意為逺古人故與斯邈並别其誤至此儋有嵩山圭禪師等碑傳于世字亦不甚工衛夫人帖蓋唐初李懷琳作事見竇臮述書賦如續帖中嵇康絶交書世傳七賢帖皆懷琳僞迹也此與師帖尤踈謬按梁蕭子雲答武帝敕云臣昔不能拔賞隨時所貴規模子敬多厯年所年二十六著晉史至二王列傳欲作論草𨽻法言不盡意遂不能成十許年始見敕旨論書一卷商略筆狀洞徹字體始變子敬全範元常逮爾已來自覺功進此僞帖云但衛隨世所學規摹鍾繇遂厯多載年二十著詩論草𨽻又云筆勢洞精字體遒媚皆竊取子雲啓中語欲小改之遂失其句讀今世髙識豈無何不悟此又衛夫人乃晉李矩妻李充母名鑠字茂猗既與師書自當著名不但稱夫族及姓也以數事考之其僞不疑又前輩論此帖以其敕字從力館從舍為僞未中其病蓋自二王以來訛字甚多陳為陳䇿為策皆二王輩自製不可據此定真僞也隋朝書中敬字缺其波蓋淳化中摹此書時特省去避諱耳或指此目為僞帖非也梁武帝書評乃命袁昻作者其答啓云奉敕遣臣評古今書臣愚短豈敢輒量江海但天旨諉臣斟酌是非謹品字法如前此云梁武評書誤矣袁昻不以書名而評裁諸家曲盡茟勢然論者以其評張芝書云如漢武愛道慿虛欲仙則欲仙而已至况薄紹之書乃云如仙人嘯樹則真仙也為此擬失倫此亦一病也寫此者字法局束天然太少疑非智果書果號得右軍骨借譽浮其實亦不至爾何氏書若云何人耳或以為何姓非也米以二帖為歐陽率更書良是敬祖鄱陽二帖大令部中已有此重出耳敬祖王道子武岡侯協也與大令不同時恐非其書孤不度德量力與亮曰董卓以來二帖皆諸葛傳中與昭烈問答語有一段自孫權據有江東以下與此文相接誤置苐十卷王大令部中皆章草書雖字畫大小微異而筆勢若一大是全寫亮傳首語此文雖出亮言亦史家潤色之又中云亮曰亦史家所記米遂謂亮書差千里矣僕謂此帖當是逸少書蓋與此公章草豹奴帖筆法同移屋有意適間曠二帖真羊中散書與唐薛雍家所畜筆精帖字勢同與法帖本部中三月六日帖殊不類彼六日帖乃僞也筆精帖真羊公得意書或以為逸少則誤矣法帖刋誤卷上
