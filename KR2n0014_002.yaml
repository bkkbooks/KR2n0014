body:
  text: 法帖刋誤卷下宋黃伯思撰第六王㑹稽書上自適得書至慰馳踈耳中間諸帖除穆松及秋中二帖差似逸少書餘並近世不工書者僞作耳非特筆無晉韻又宅上靜眠過此如命等乃今流俗語不待觀筆跡已可辨之諸酸感至比加下及宰相并噉豆鼠伏想㛐等亦僞作蓋以逸少别帖垂三十年比加下㿃等語厠其間或云宰相安和帖乃郗愔書謂宰相者簡文作相王時也殷生者殷浩也然此或是書郗愔帖語耳而結字實近世人僞作愔書自與逸少早年抗衡而此帖了無晉韻其非審矣鯉魚帖敬字行成帖殷字皆缺語在第五章夫人及蔡家二帖亦後人依倣賈曽送張說赴朔方序中云備官而行成旅比從下云有詔具寮爰開祖宴且申後命寵以蕃錫此卷有此文自行字上祖字下皆亡之而作草書多之綴屬當是集逸少書寫此序耳先輩以為張說送賈至文非也米亦以自是月下為僞殊不知自行成下已僞蓋此帖失其首尾而米未嘗考賈曽文也闊别稍久眷與時長帖末云遇信忩遽萬不一陳字既甚惡而筆語乃爾非逸少書無疑吾昨得一日一起帖米以為張長史書有之但米論書多以草字差大者為非二王書一概求之理恐未竟追尋帖米以為大令書非也字勢圓緊既非獻之體而中云吾老矣餘願未盡惟在子輩耳案大令壽四十三初無後嗣與此不合又法書要録逸少帖內有此語固宜在此卷二十日以下二帖結體雖踈詞筆皆有王氏風氣殆是唐人縱筆臨倣非摹搨也不得臨川問帖亦非逸少書庾子嵩非同時人也朱處仁帖在十七帖間其中有云往得其書信遂不取答謂昔嘗得其書而信人竟不取報書耳而世俗遂誤讀為往得其書信殊不知信者乃使人也自連下語非若今之所謂書信也第一篇晉武帖中已評辨之第七王㑹稽書中得都下九日帖中云蔡公者蔡謨也仁祖者謝尚也晉穆帝永和十二年秋桓公破姚襄至洛故此云久當至洛是時將以謝尚鎮司州以病止故此云得仁祖二十六日問疾更委篤與陶穀家所畜逸少破羌帖中所書事正同其帖云知虞帥書桓公以至洛即摧破羌賊賊重命想必禽之王略始及舊都使人悲慨深此公威略實著自當求之于古真可以戰使人歎息知仁祖小差此慰可言適范生書如其語無異故須後問為定令以書示君僕嘗跋之云晉穆帝永和十二年秋桓溫破姚襄于伊水遂至洛時將以謝尚鎮之屬病不行所云桓公摧破羌賊及仁祖小差正當時事也是時逸少去㑹稽內史已嵗餘方遁迹山水間冝不復以世務經懷而此書乃歎宣武之威略悲舊都之始平憂國嗟時志猶不息惜其一憤逺引使才猷約結弗光于世獨區區遺翰見寶後人覽之深為興歎此帖草法極工惜不載法帖間故附見此與足下意政同政當作正蓋逸少祖尚書郎名正故王氏作書正月或作初月或作一月他正字皆以政代之後人相承斆之非也自初月二日至前後洛帖皆僞如中月有云羲之是耳願知心素致使如然也願足下莫見責乃俗人僞作苐恐是著書觀其所補永禪師十字格韻與此正同十月七日帖米以為集成豫謂昨見君帖亦然蓋二帖字意皆不相屬而十月帖頗取十七帖中足慰前可令必達以副此志逺想慨然等帖中語厠其間如云足下尚停數日得告承長平未佳足下小大佳也知比丹陽書熱日更甚期已至旦反想至七帖皆後人依倣中有云不易可得過夏知有患者早乘凉行皆非當時人語承足下還來一帖不論可見其僞荀侯帖云安西音信明公還後歸洛也詞筆皆如初月帖劉次莊釋云安好音信那可遇得歸洛也深以自慰晚復毒熱二帖唐文皇所臨者羲之白耳帖不論可見其僞僕近修小園子殊佳帖米以為子敬書僕謂處動靜以下方是子敬筆前兩行乃唐人書字勢帖語與後逈殊第八王㑹稽書下羲之死罪小大悉佳帖書殊惡末云因緣不多亦近代所為耳足下各如常亦唐人作比初月帖差勝中云淡悶干嘔淡古淡液之淡千古干濕之干今人以淡作痰以干作乾非也據此當亦非今人所作闊轉久帖末云卒未近緣如何非晉士語阮公故爾一帖非逸少書蒸濕帖米云大令代父書非也蓋結字殊不同詞亦異晉體修齡王胡之也重熙郗曇也安西庾翼也其云一昨得安西六日書無他無所知說故不復付送讓都督表亦復常言耳案翼之鎮荆州以石虎衰暴屢表請北伐康帝及朝士皆遣使譬止孫綽輩亦致書諫之則逸少所見之表殆亦論北伐事也翼之此舉朝論弗以為然故逸少以為常言及聞其遷襄陽乃云稚恭遂進鎮東西齊舉想克定有期也則始雖同羣議而終以為當猶趙充國之計罕羌初是之者十三中十五最後十八有詔詰前言不便者皆頓首服無足怪也然翼有志無年徒奮十倍之氣而蔑一統之功此志士所嗟慨者逸少所書進鎮帖唐張彥逺載於書録今聞在王仲修家月半帖雖晉人語字不合作蓋後人寫二王尺牘中語耳此郡帖來謂與王述書非也逸少與藍田方隙而為屬郡既檢察苛急主者疲于課對正救過不暇豈復尺牘間自彰其逋滯哉此帖官本傳摹甚失真如以就勞為能勞小却為小都皆轉失草法也適𣣔遣書帖非逸少書逸少十七帖本唐正觀御府中書張彥逺云王草書中烜赫著名帖也僕謂當時書卷首帖有十七日字故諸帖總謂之十七耳非帖數也本二十七條今官法帖有其十五散置逸少書三卷中又續法帖有五而卭竹杖絲布衣漢講堂諸葛顒天鼠膏四果種虞安吉七條不載當是亡軼而世有完卷者傳模殊精非此比也此卷有帖云周益州送此卭竹杖卿尊長或須今送僕案十七帖有云去夏足下致卭竹杖皆至此士人多有尊老者皆即分布令知足下逺惠之至以前帖觀之即知此帖蓋與周益州矣自昔相傳十七帖乃逸少與蜀太守者未必盡然然其中問蜀事為多是亦應皆與周益州書也但來禽一帖則或以為與桓溫而已本朝僧邦者有寄李昌武翰林詩云來禽簡寄桓宣武不知何據案此帖有云吾在田里惟以此為事足下致此子者大惠也逸少視桓公位殊遼絶與書不當爾耳然當時真長子猷輩猶嫚侮桓公彼亦能容逸少作書若交友蓋無足怪溫飛卿詩云畫圖驚畏獸書帖得來禽此帖垂寶非一世也第九王大令書上此卷王大令部僞者最少相過無復日借匪獻之韻自可賞鵝還慰姊意帖鵝者王氏子姓之小字耳猶袁羊顧虎之類或以此鵝即逸少所愛之鵝甚可鄙笑二十九日帖云昨遂不奉恨深此近世人語非子敬書靜息帖云賴消息內外極生冷內外二字本行旁注故字差小而昧者摹填著行中非也當依本為勝諸帖中此例甚多如十七帖中逺想慨然孔琳之帖恨恨腳中轉劇等字本皆側注後人摹以入行雖失格體猶于理未害至于讀蘭亭叙者以不知老之將至旁一僧字為逸少作曽字之誤借使摹入行中則害理矣案古蘭亭叙本二十八行至苐十四行間特闊者蓋接紙處而不與知字適在此行之末梁舍人徐僧權于其旁著名當時謂之押縫梁御府中法書率如此而此帖僧字下亡其權字近世人殊不知此乃云僧者曽之誤因讀為曽不知老之將至非也又案晉史逸少本傳及書録第十卷皆載此叙但云不知老之將至而無曽字益可是正乃知善摹帖者勿問其黵泧注缺橫斜細大一放其本而不小易乃不失真矣今法帖多妄更易之至以注字入行大小既殊體不綴屬後人不曉從而效之一行之中洪纖頓異號子母體如苐五卷近世僞作釋智果書是也每一觀之使人深慨靜息帖云礜石深是可疑事兄喜患散輒發癰散者寒食散之類散中蓋用礜石是性極熱有毒故云深可疑也劉表在荆州與王粲登障山見一岡不生百草粲曰此必古冢其人在世服生礜石熱蒸出外故草木焦滅鑿看果墓礜石滿塋又今洛水冬月不氷古人謂之溫洛下亦有礜石今取此石置瓮水中水亦不氷又鸛伏卯以助暖氣其烈酷如此固不宜餌服子敬之語實然聊附于此授衣帖厯世所傳自為一卷法帖中亡其帖尾政在此耳下當云當今可復使不萬全不願其以多算難易得之便自可令不為因纍耳比者忉怛當不可言當不可言獻之死罪法帖無此四十三字入其間多有燥筆及魚食處而官帖不復依本其失多矣奉對帖云方欲與姊極當年之足以之偕老豈謂乖反至此當是與郗家帖也案子敬病篤請道士上章法應首過子敬曰不憶餘事惟省與郗家離婚子敬前室郗曇女也郗氏自太尉鑒後為江左名族其姓讀如絺繡之絺而世人以俗書郗字作郤因讀為郤詵之郤非也郤詵乃春秋晉大夫郤縠郗鑒乃漢御史大夫郗慮之後姓原既異音讀逈殊後世因俗書相亂郗郤二姓遂不復辨亦近代氏族及小學二家之學不講故也陸魯望博古矣其詩有云一段清香染郤郎亦誤讀也今因郗氏帖聊爾及之以紀俗繆梁中書郎虞和表云逸少為㑹稽子敬為吳興故三吳之地偏多遺迹又是暮年遒美之時今此卷中亦時有吳興帖然大令帖傳于世佳者尚多如乞假表庾公帖周姊帖洛神賦劉氏所藏十二字等帖官帖中皆遺之僕頃以韻語題河南王氏所藏子敬帖云君家大令書盈紙筆勢翩翩趣多媚雖云沓拖如少年豈至拘攣同餓𨽻㑹稽七子五知名此公風槩尤超詣太極琁題猶重書謂不書太極殿榜一時凛凛標英氣半袖精裓衆爭求數幅新裙世尤貴當時親遇得已難況復傳今僅千嵗龍珠歸浦劔還津此帖君藏真得地才披尺許目增明鸞跂鴻驚欲飛逝硬黃響搨若傳吾完璧摹刋願垂世聊爾以記大令書事漫附于此𤣥度時來一帖米以為無名人作僕謂此真晉人語但筆勢踈緩多失落耳謂大令書則非蓋中云仁祖欲請為軍司案獻之以晉孝武太元十一年年四十三卒上推謝尚于穆帝升平元年卒時獻之方年十三請軍司又在升平前大令是時才十許嵗安得已作書論時事殆是穆帝時他人書後𤣥度何來遲亦此類薄冷益部二帖米以為歐陽率更書實然但米誤以益部字為益郎蓋下接耆舊傳字此帖蓋借陳壽所著益部耆舊傳也詠史詩鬱鬱澗底松數句乃集大令書一月二十九日黃門帖亦王氏書而非大令也第十王大令書下吾當託桓江州助汝帖米以為張長史書雖未必然要非大令書也案此帖不至惡但縱任近俗無晉世清韻真非大令書但殊不知亦寫右軍帖詞耳張彥逺右軍帖録有此語此卷亡其半其上略云汝决欲來下上方大枋想汝不過數枋足人方足不果爾可白吾當託桓江州助汝續帖逸少部中有前段結字殊應模矩蓋王氏子弟臨逸少書勝此逺矣疾不退至分張帖諸大草字語類江表人𤣥度何來亦似逸少語其字皆張長史藏真輩僞作或自書二王帖語耳與第二卷知汝殊愁及藏真長史部中諸帖一手也豹奴桓嗣也王氏甥故二王帖中時及之如云豹如晚歸家之類然此豹奴惟省一書帖亦後人依放極熱敬惟府君帖云來時幾得問希此消息極悶悶又云意甚無賴君有好藥云云極濟事耶又服油帖云不至絶艱辛也皆近世俗言字勢亦不至佳非王氏帖明甚七月二日獻之白七字人僞作也下章草云孫權據有江東以厯三世亦蜀志中語與第五卷章草不可爭鋒也語相接字雖大小異乃一人書語已見本章此段世字缺中畫蓋唐人臨摹時去之以避諱猶今集法帖時殷敬二字多省其波也但東連吳㑹與用武之國連武二字章草體差相亂摹者謬互置之復面悲積宋齊人書㛐等帖王氏書亦非大令鵝羣帖前輩謂此墨帖乃大令真筆僕觀此書殊不惡但怒張狂徑無晉諸賢韻味而前輩乃云此帖筆勢險逺如從空中數丈外擲下恐是真筆此非僕之所敢知也又此帖詞云崇虛劉道士鵝羣並復歸也獻之等須向彼謝之亦非當時尺牘體蓋以大令父逸少嘗書道德經換鵝而山隂曇壤村道士舉羣贈之故以此事傅㑹作是帖耳案崇虛館乃宋明帝泰始四年建子敬晉人去亡慮五十餘年何得己稱之其僞可無疑又按魏收釋老志太和十五年詔立道家寺宇于桑乾之隂名崇虛寺去晉愈逺矣豫前所校量諸書詎敢自謂竟理要非臆决目論蓋書雖小道亦六藝之一能之既艱知亦匪易然天下理當為天下士言之真賞難遇豈獨論書哉法帖刋誤卷下
