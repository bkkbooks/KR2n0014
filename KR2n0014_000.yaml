body:
  text: 法帖刋誤目録類二金石之屬提要臣等謹案法帖刋誤二卷宋黃伯思撰伯思有東觀餘論已著録初米芾取淳化閣帖一一評其真偽多以意斷制罕所考證伯思復取芾之所定重為訂正以成此書前有大觀戊子自序稱芾踈略甚多或偽迹甚著而不覺者若李懷琳所作衛夫人書逸少闊别稍久帖之類有審其偽而譏評未當者若知伯英大令諸草帖為唐人書而不知乃書晉人帖語之類有譏評雖當主名昭然而不能辨者若以田疇字為非李斯書而不知乃李陽冰明州碑中字之類有誤著其主名者若以晉人章草諸葛亮傳中語遂以為亮書之類其論多確其他亦指摘真偽率有依據末有政和中王珍許翰二跋據珍跋乃伯思官洛中時觀珍家所藏閣帖作也其書本自為一編故至今有别行之本諸家書目亦别著録後其子䚮乃編入東觀餘論中耳湯垕畫鑒曰宋人賞鑒精妙無如米元章然此公天資極髙立論時有過處後有黃伯思長睿者出作法帖刋誤専攻米公之失僕從而辨析其詳作法帖正誤専指長睿之過今禾見垕書不知所正者何誤然垕亦空談鑒别而不以考證為事者恐所正亦未必確也乾隆四十六年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:8aaf3017565c3f35da0b3dd123468a54eda5bcbcb8ff02eaa11bf61db7bfd0e9
